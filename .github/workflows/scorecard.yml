name: OpenSSF Scorecard

# Weekly automated security-posture audit by OSSF. Scores the repo
# against ~20 criteria (branch protection, pinned actions, dangerous
# workflows, SAST coverage, etc.) and uploads SARIF to GitHub
# code-scanning. Also fires on branch-protection-rule changes so a
# regression in protection settings is caught immediately.

on:
  branch_protection_rule:
  schedule:
    - cron: '20 7 * * 2'  # Tuesday 07:20 UTC
  push:
    branches: ['main']

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # to upload SARIF
      id-token: write          # to publish results
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@bc0b696b4103f5fe60f15749af68a046868d511a  # codeql-bundle-v2.25.4
        with:
          sarif_file: results.sarif

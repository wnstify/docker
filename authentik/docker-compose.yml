# Authentik — Hardened Docker Compose (server + worker + postgres)
# Open-source SSO / identity provider: https://goauthentik.io/
#
# Architecture (3 services, no Redis):
#   - postgres  — official postgres:18.4 (internal-only net, no internet)
#   - server    — ghcr.io/goauthentik/server (web UI + API on 9000/9443)
#   - worker    — same image, command: worker (Celery-style background tasks,
#                 now backed by Postgres queue instead of Redis)
#
# Note on Redis: authentik 2025.10 (Oct 2025) removed the Redis dependency
# entirely — task queue, cache, and websocket channels all moved to
# Postgres-backed implementations (django_postgres_cache,
# django_channels_postgres, authentik_tasks). This compose targets 2026.2.x
# so there is intentionally no redis service.
#
# Security baseline (verified by test, May 2026):
#   - All three containers run as ${PUID}:${PGID} (no root) and need
#     ZERO Linux capabilities — every service starts and runs healthy
#     with cap_drop: ALL and no cap_add at all.
#   - security_opt: no-new-privileges; ipc: private
#   - tmpfs for ephemeral writes; deploy.resources limits incl. pids
#   - Two-network split: authentik-front (external bridge — reverse-proxy
#     reach + internet egress for SMTP / OIDC / webhooks) and
#     authentik-db (--internal, no internet egress for postgres)
#   - 127.0.0.1 port binding — reverse proxy in front for TLS
#   - Healthchecks gate startup via depends_on; built-in ak healthcheck
#     for server/worker, pg_isready for postgres
#   - Postgres uses SCRAM-SHA-256 password auth (stronger than default md5)
#   - Worker has NO docker.sock mount by default — see README for the
#     optional outpost-integration upgrade path
#
# Setup:
#   cp .env.example .env  &&  fill secrets (openssl recipes in the file)
#   docker network create authentik-front
#   docker network create --internal authentik-db
#   mkdir -p data/{database,media,certs,custom-templates}
#   docker compose up -d

name: authentik

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # DATABASE
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:18.4
    container_name: authentik-postgres
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      POSTGRES_USER: ${PG_USER:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS:?database password required}
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
      # Postgres 18 changed its default data dir; pin it back so users
      # upgrading from postgres:17 don't need a migration.
      PGDATA: /var/lib/postgresql/data
      TZ: ${TZ:-Europe/Bratislava}
    volumes:
      - ./data/database:/var/lib/postgresql/data
    networks:
      - authentik-db
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=64m
      - /var/run/postgresql:size=64m
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
          pids: 300
        reservations:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${PG_USER:-authentik} -d ${PG_DB:-authentik}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # WEB UI + API
  # ═══════════════════════════════════════════════════════════════════════════

  server:
    image: ghcr.io/goauthentik/server:2026.2.3
    container_name: authentik-server
    restart: unless-stopped
    command: server
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # localhost-only — front with a reverse proxy for public TLS.
      - "127.0.0.1:${COMPOSE_PORT_HTTP:-9000}:9000"
      - "127.0.0.1:${COMPOSE_PORT_HTTPS:-9443}:9443"
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      TZ: ${TZ:-Europe/Bratislava}
    # env_file pulls in optional AUTHENTIK_EMAIL__* and BOOTSTRAP vars
    # without forcing them to be set.
    env_file:
      - .env
    volumes:
      - ./data/media:/media
      - ./data/custom-templates:/templates
    networks:
      - authentik-front
      - authentik-db
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
          pids: 500
        reservations:
          memory: 512m
          cpus: "0.25"
    healthcheck:
      # Built-in ak healthcheck; covers gunicorn + DB reachability.
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ═══════════════════════════════════════════════════════════════════════════
  # BACKGROUND WORKER
  # ═══════════════════════════════════════════════════════════════════════════

  worker:
    image: ghcr.io/goauthentik/server:2026.2.3
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      TZ: ${TZ:-Europe/Bratislava}
    env_file:
      - .env
    # NOTE: /var/run/docker.sock is INTENTIONALLY not mounted. Upstream
    # mounts it as root so the worker can auto-deploy Docker outposts
    # (proxy / LDAP / RADIUS), but that grants the worker process root on
    # the host. The hardened default is "no docker socket, no root." See
    # README for the optional outpost-integration upgrade path.
    volumes:
      - ./data/media:/media
      - ./data/certs:/certs
      - ./data/custom-templates:/templates
    networks:
      - authentik-front
      - authentik-db
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
          pids: 500
        reservations:
          memory: 512m
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

# ═══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════

networks:
  # External-facing: reverse proxy reaches authentik via 127.0.0.1 port
  # binding; also gives server/worker internet egress for SMTP, OIDC
  # callbacks, outbound webhooks, LDAP source sync, etc.
  authentik-front:
    external: true
  # Internal: postgres only — no internet egress, no host port.
  authentik-db:
    external: true

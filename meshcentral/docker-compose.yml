# MeshCentral RMM — Hardened Docker Compose
# Security: cap_drop ALL, no-new-privileges, ipc private, read_only where possible,
#           resource limits, internal network, DHI MongoDB, non-root execution.
#
# Requires: .env, config.json (generated by generate-config.sh)
# Usage:    ./generate-config.sh <domain> && docker compose up -d

name: meshcentral

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION
  # ═══════════════════════════════════════════════════════════════════════════

  meshcentral:
    image: ghcr.io/ylianst/meshcentral:latest-mongodb
    restart: unless-stopped
    # Image manages its own user; needs write to /opt/meshcentral for runtime modules
    ports:
      - "127.0.0.1:${MC_PORT:-4430}:443"
      - "${TAILSCALE_IP:-127.0.0.1}:443:443"
    environment:
      - NODE_ENV=production
      - DYNAMIC_CONFIG=false
      - CONFIG_FILE=/opt/meshcentral/meshcentral-data/config.json
    volumes:
      - ./data/meshcentral-data:/opt/meshcentral/meshcentral-data
      - ./data/meshcentral-files:/opt/meshcentral/meshcentral-files
      - ./data/meshcentral-backups:/opt/meshcentral/meshcentral-backups
    networks:
      - mc-frontend
      - mc-internal
    depends_on:
      mongodb:
        condition: service_started
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
        reservations:
          memory: 256m
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('https');const r=h.request({hostname:'localhost',port:443,path:'/health.ashx',method:'GET',rejectUnauthorized:false},s=>{process.exit(s.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.end()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # DATABASE — Docker Hardened Image (dhi.io)
  # ═══════════════════════════════════════════════════════════════════════════

  mongodb:
    image: dhi.io/mongodb:8.0-debian13
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    command: ["--bind_ip_all"]
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - mc-internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
        reservations:
          memory: 256m
          cpus: "0.25"
    # DHI runtime — no shell for healthcheck; internal network only (no auth needed)
    healthcheck:
      disable: true

# ═══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════

networks:
  # Bridge: MeshCentral HTTPS bound to 127.0.0.1 for reverse proxy
  mc-frontend:
    driver: bridge

  # Internal: MeshCentral <-> MongoDB only
  mc-internal:
    driver: bridge
    internal: true

# MeshCentral RMM — Hardened Docker Compose
# Self-hosted RMM platform: https://meshcentral.com/
#
# Architecture:
#   - mongodb       — official mongo:8.0.x (internal-only network, no auth needed)
#   - meshcentral   — ghcr.io/ylianst/meshcentral (Node.js HTTPS + agent hub)
#
# Security baseline:
#   - cap_drop: ALL with verified minimum caps (tested 2026-05):
#       * meshcentral: NET_BIND_SERVICE (port 443 inside container)
#                    + DAC_OVERRIDE   (write certs to volume owned by host UID)
#       * mongodb:    none — runs as PUID:PGID, official entrypoint skips
#                     the root chown/gosu dance when started non-root
#   - security_opt: no-new-privileges; ipc: private
#   - tmpfs for ephemeral writes; deploy.resources limits incl. pids
#   - Two-network split: mc-frontend (bridge) + mc-internal (--internal,
#     no internet egress for mongodb)
#   - 127.0.0.1 port binding for the web UI — reverse proxy in front for TLS
#   - Healthchecks gate startup via depends_on; mongo uses mongosh ping
#
# Setup:
#   ./generate-config.sh <domain> [--tailscale <ip>]
#   docker compose up -d

name: meshcentral

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # DATABASE
  # ═══════════════════════════════════════════════════════════════════════════

  mongodb:
    image: mongo:8.0.23
    container_name: meshcentral-mongodb
    restart: unless-stopped
    # Run as host UID:GID so the bind-mounted /data/db is writable without
    # the official entrypoint's root-then-gosu privilege dance. With user:
    # set, the entrypoint detects non-root and exec's mongod directly —
    # no capabilities required.
    user: "${PUID}:${PGID}"
    # mongod binds to 127.0.0.1 by default; we need it reachable from
    # meshcentral over mc-internal (still no internet egress, no host port).
    command: ["--bind_ip_all"]
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - mc-internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=64m
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
        reservations:
          memory: 256m
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION
  # ═══════════════════════════════════════════════════════════════════════════

  meshcentral:
    image: ghcr.io/ylianst/meshcentral:1.1.59-mongodb
    container_name: meshcentral
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      # Web UI + agent connections — reverse proxy target.
      - "127.0.0.1:${MC_PORT:-4430}:443"
      # Tailscale mode: agents connect directly via Tailscale IP on :443.
      # When TAILSCALE_IP=127.0.0.1 (default, set by generate-config.sh in
      # standard mode), this collides with nothing — both bindings land
      # on localhost:4430 and localhost:443 respectively.
      - "${TAILSCALE_IP:-127.0.0.1}:443:443"
    environment:
      - NODE_ENV=production
      - DYNAMIC_CONFIG=false
      - CONFIG_FILE=/opt/meshcentral/meshcentral-data/config.json
    volumes:
      - ./data/meshcentral-data:/opt/meshcentral/meshcentral-data
      - ./data/meshcentral-files:/opt/meshcentral/meshcentral-files
      - ./data/meshcentral-backups:/opt/meshcentral/meshcentral-backups
    networks:
      - mc-frontend
      - mc-internal
    cap_drop:
      - ALL
    cap_add:
      # node binds 80 (redir) + 443 (HTTPS) inside the container.
      - NET_BIND_SERVICE
      # Process is root in container; data volume is owned by host UID
      # (from generate-config.sh chown). Without DAC_OVERRIDE, cert
      # generation fails with EACCES on first boot.
      # CHOWN/SETUID/SETGID NOT needed — entrypoint never drops privileges
      # or changes ownership. Verified by test 2026-05.
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
        reservations:
          memory: 256m
          cpus: "0.25"
    healthcheck:
      # Hit the internal HTTPS server's /health.ashx — covers full stack
      # (meshcentral can't reach this endpoint if mongo is down).
      test: ["CMD", "node", "-e", "const h=require('https');const r=h.request({hostname:'localhost',port:443,path:'/health.ashx',method:'GET',rejectUnauthorized:false},s=>{process.exit(s.statusCode===200?0:1)});r.on('error',()=>process.exit(1));r.end()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# ═══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════

networks:
  # Bridge: MeshCentral exposes HTTPS to host via 127.0.0.1 port binding;
  # also lets the node process reach the public internet for module installs
  # and signed-agent fetches.
  mc-frontend:
    driver: bridge

  # Internal: MeshCentral <-> MongoDB only — no internet egress for mongo.
  mc-internal:
    driver: bridge
    internal: true

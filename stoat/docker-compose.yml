# Stoat (formerly Revolt) — Hardened Docker Compose
# Security: cap_drop ALL, no-new-privileges, ipc private, read_only,
#           tmpfs, resource limits, internal networks, healthchecks.
#           All containers run as UID 1000:1000.
#
# Requires: .env, secrets.env, .env.web, Revolt.toml, garage.toml,
#           livekit.yml, Caddyfile
# Generate: ./generate-config.sh <domain>
# Usage:    docker compose up -d

name: stoat

# =============================================================================
# SHARED HARDENING ANCHOR
# =============================================================================

# Stoat Rust images run as 'nonroot' (UID 65532) by default.
# Infrastructure services run as ${PUID}:${PGID} (auto-detected by generate-config.sh).
x-stoat-hardening: &stoat-hardening
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  ipc: private
  tmpfs:
    - /tmp:size=256m

x-stoat-config-volume: &stoat-config
  type: bind
  source: ./Revolt.toml
  target: /Revolt.toml
  read_only: true

# =============================================================================
# INFRASTRUCTURE
# =============================================================================

services:

  database:
    image: docker.io/mongo:8.3.2
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    command: mongod --auth --bind_ip_all
    volumes:
      - ./data/db:/data/db
    networks:
      - stoat-data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"
          pids: 200
        reservations:
          memory: 512m
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: docker.io/redis:8.6.3-alpine
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    networks:
      - stoat-data
      - stoat-voice
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    read_only: true
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
          pids: 100
        reservations:
          memory: 128m
          cpus: "0.1"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbit:
    image: docker.io/rabbitmq:4.2.5-alpine
    restart: unless-stopped
    user: "100:101"  # rabbitmq user inside image; data dir pre-chowned to match
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD}
      # Memory detection misfires on this host — set explicit watermarks
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit vm_memory_high_watermark_paging_ratio 0.9 -rabbit vm_memory_high_watermark {absolute,\"900MiB\"}"
    volumes:
      - ./data/rabbit:/var/lib/rabbitmq
    networks:
      - stoat-rabbit
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "0.5"
          pids: 150
        reservations:
          memory: 128m
          cpus: "0.1"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 90s

  # Garage: S3-compatible object storage (replaces MinIO)
  garage:
    image: docker.io/dxflrs/garage:v2.3.0
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - ./data/garage-meta:/var/lib/garage/meta
      - ./data/garage-data:/var/lib/garage/data
    networks:
      - stoat-data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
        reservations:
          memory: 256m
          cpus: "0.25"
    # scratch image — no shell for healthcheck; garage-init waits for admin API
    healthcheck:
      disable: true

# =============================================================================
# APPLICATION SERVICES
# =============================================================================

  api:
    image: ghcr.io/stoatchat/api:v0.12.1
    restart: unless-stopped
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - <<: *stoat-config
    networks:
      - stoat-app
      - stoat-data
      - stoat-rabbit
    <<: *stoat-hardening
    read_only: true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
        reservations:
          memory: 256m
          cpus: "0.25"

  events:
    image: ghcr.io/stoatchat/events:v0.12.1
    restart: unless-stopped
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - <<: *stoat-config
    networks:
      - stoat-app
      - stoat-data
    <<: *stoat-hardening
    read_only: true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
        reservations:
          memory: 256m
          cpus: "0.25"

  autumn:
    image: ghcr.io/stoatchat/file-server:v0.12.1
    restart: unless-stopped
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    volumes:
      - <<: *stoat-config
    networks:
      - stoat-app
      - stoat-data
    <<: *stoat-hardening
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
        reservations:
          memory: 256m
          cpus: "0.25"

  january:
    image: ghcr.io/stoatchat/proxy:v0.12.1
    restart: unless-stopped
    env_file: secrets.env
    volumes:
      - <<: *stoat-config
    networks:
      - stoat-app
    <<: *stoat-hardening
    read_only: true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
          pids: 100
        reservations:
          memory: 128m
          cpus: "0.1"

  gifbox:
    image: ghcr.io/stoatchat/gifbox:v0.12.1
    restart: unless-stopped
    env_file: secrets.env
    volumes:
      - <<: *stoat-config
    networks:
      - stoat-app
    <<: *stoat-hardening
    read_only: true
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
          pids: 50
        reservations:
          memory: 64m
          cpus: "0.05"

  crond:
    image: ghcr.io/stoatchat/crond:v0.12.1
    restart: unless-stopped
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
      mongo-init:
        condition: service_completed_successfully
    volumes:
      - <<: *stoat-config
    networks:
      - stoat-data
    <<: *stoat-hardening
    read_only: true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
          pids: 100
        reservations:
          memory: 128m
          cpus: "0.1"

  pushd:
    image: ghcr.io/stoatchat/pushd:v0.12.1
    restart: unless-stopped
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - <<: *stoat-config
    networks:
      - stoat-data
      - stoat-rabbit
    <<: *stoat-hardening
    read_only: true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
          pids: 100
        reservations:
          memory: 128m
          cpus: "0.1"

  voice-ingress:
    image: ghcr.io/stoatchat/voice-ingress:v0.12.1
    restart: unless-stopped
    env_file: secrets.env
    depends_on:
      database:
        condition: service_healthy
      rabbit:
        condition: service_healthy
    volumes:
      - <<: *stoat-config
    networks:
      - stoat-app
      - stoat-data
      - stoat-rabbit
    <<: *stoat-hardening
    read_only: true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
          pids: 100
        reservations:
          memory: 128m
          cpus: "0.1"

  livekit:
    image: ghcr.io/stoatchat/livekit-server:v1.9.13
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    command: --config /etc/livekit.yml
    depends_on:
      redis:
        condition: service_healthy
    ports:
      # TCP signaling handled by Caddy; UDP must be host-exposed for WebRTC media
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - type: bind
        source: ./livekit.yml
        target: /etc/livekit.yml
        read_only: true
    networks:
      - stoat-app
      - stoat-voice
      - stoat-frontend  # needs outbound DNS for STUN (external IP discovery)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    read_only: true
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 200
        reservations:
          memory: 256m
          cpus: "0.25"

  web:
    image: ghcr.io/stoatchat/for-web:0b94704
    restart: unless-stopped
    env_file: .env.web
    networks:
      - stoat-app
    <<: *stoat-hardening
    # inject.js writes to /app/dist_injected at startup — cannot use read_only
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
          pids: 50
        reservations:
          memory: 64m
          cpus: "0.05"

# =============================================================================
# REVERSE PROXY (internal — reverse proxy handles external TLS)
# =============================================================================

  caddy:
    image: docker.io/caddy:2.11.3
    restart: unless-stopped
    # caddy binary has file capabilities — must run as root with cap_drop ALL
    env_file: .env.web
    ports:
      - "127.0.0.1:8880:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      stoat-frontend:
      stoat-app:
        aliases:
          - "${STOAT_DOMAIN:-caddy}"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    ipc: private
    read_only: true
    tmpfs:
      - /tmp:size=64m
      - /config:size=16m
      - /data:size=16m
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
          pids: 50
        reservations:
          memory: 32m
          cpus: "0.05"
    depends_on:
      - api
      - events
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O /dev/null http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# =============================================================================
# INIT CONTAINERS
# =============================================================================

  # MongoDB bootstrap: pre-creates collections that Stoat's crond cleanup tasks
  # query on fresh deploys (attachments file-prune, server_members dangling-prune).
  # Without this, crond restart-loops harmlessly until first user activity creates
  # the collections.
  #
  # Must run AFTER api completes its admin_migrations: api panics with
  # "Database was configured incorrectly" if it sees existing collections but
  # no `migrations` record. We poll for `migrations` to be populated before
  # creating our own collections. Idempotent across restarts.
  mongo-init:
    image: docker.io/mongo:8.3.2
    user: "${PUID}:${PGID}"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - stoat-data
    environment:
      HOME: /tmp
      MONGO_USER: ${MONGO_ROOT_USER}
      MONGO_PASS: ${MONGO_ROOT_PASSWORD}
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        URI="mongodb://$$MONGO_USER:$$MONGO_PASS@database:27017/revolt?authSource=admin"
        echo "waiting for api admin_migrations to populate 'migrations' collection..."
        timeout=300
        while [ $$timeout -gt 0 ]; do
          if mongosh "$$URI" --quiet --eval 'quit(db.migrations.countDocuments() > 0 ? 0 : 1)' >/dev/null 2>&1; then
            break
          fi
          sleep 3
          timeout=$$((timeout - 3))
        done
        if [ $$timeout -le 0 ]; then
          echo "timeout waiting for api migration; exiting without changes (crond may restart-loop until first user activity)"
          exit 0
        fi
        echo "api migration done; creating cleanup-target collections..."
        mongosh "$$URI" --quiet --eval '
          ["attachments","server_members"].forEach(c => {
            try { db.createCollection(c); print("created:", c); }
            catch(e) { print("exists:", c); }
          });
        '
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    read_only: true
    tmpfs:
      - /tmp:size=64m
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
          pids: 50

  # Garage bootstrap: assigns layout, creates S3 bucket and API key
  garage-init:
    image: docker.io/alpine:3.23.4
    # needs root for apk add; one-shot container, exits immediately
    depends_on:
      garage:
        condition: service_started
    networks:
      - stoat-data
      - stoat-frontend  # internet access for apk add (one-shot init)
    environment:
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
    volumes:
      - ./init-scripts/init-garage.sh:/init-garage.sh:ro
    entrypoint: ["sh", "/init-garage.sh"]
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=32m
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
          pids: 50

# =============================================================================
# NETWORKS — strict segmentation
# =============================================================================

networks:
  # Bridge: only Caddy binds to host (127.0.0.1:8880)
  stoat-frontend:
    driver: bridge

  # Internal: Caddy -> application services (api, events, web, autumn, etc.)
  stoat-app:
    driver: bridge
    internal: true

  # Internal: MongoDB, Redis, Garage + backend services
  stoat-data:
    driver: bridge
    internal: true

  # Internal: RabbitMQ + message consumers
  stoat-rabbit:
    driver: bridge
    internal: true

  # Internal: LiveKit + Redis (voice media)
  stoat-voice:
    driver: bridge
    internal: true

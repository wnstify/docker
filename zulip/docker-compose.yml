# Zulip — Hardened Docker Compose (server + postgres + memcached + rabbitmq + redis)
# Self-hosted team chat with topic-based threading: https://zulip.com/
#
# Architecture (5 services, two-network split):
#   - postgres   — official postgres:18.4 (vanilla, no pgroonga / tsearch_extras)
#   - memcached  — official memcached:1.6.x-alpine (session cache, SASL auth)
#   - rabbitmq   — official rabbitmq:4.2.x (event queue)
#   - redis      — official redis:7.4.x-alpine (rate-limit counters)
#   - zulip      — ghcr.io/zulip/zulip-server:12.0-0 (Django + Tornado +
#                  nginx + supervisor, all in one image per upstream)
#
# Note on postgres choice: Zulip Server 12 officially supports postgres
# 14, 15, 16, 17, and 18. Upstream's docker-zulip ships a stale
# zulip/zulip-postgresql:14 image that bundles pgroonga + tsearch_extras
# for CJK full-text search — useful for Japanese deployments, but
# unnecessary for Latin-script teams. We use vanilla postgres:18.4 +
# SETTING_USING_PGROONGA=False and let Zulip use built-in postgres
# tsvector search instead. Verified by /tmp test (May 2026): boot
# completes, supervisor brings up all workers, no extension errors.
# If you need pgroonga for non-Latin search, swap to
# zulip/zulip-postgresql:14 and set SETTING_USING_PGROONGA=True.
#
# Security baseline (verified by test, May 2026):
#   - postgres / memcached / rabbitmq / redis: cap_drop: ALL, ZERO cap_add,
#     all run non-root (postgres uid 70, memcached 11211, rabbitmq 999,
#     redis 999) — confirmed healthy with full Zulip read/write traffic.
#   - zulip: cap_drop: ALL + 6 caps (CHOWN/SETGID/SETUID/DAC_OVERRIDE/
#     FOWNER for the supervisor-based init that drops to the zulip user;
#     NET_BIND_SERVICE for nginx on port 80). Image runs root inside the
#     container (upstream design) but drops every long-running worker
#     process to uid 1000 via supervisor.
#   - security_opt: no-new-privileges; ipc: private on every container
#   - tmpfs for ephemeral writes; deploy.resources limits incl. pids
#   - Two-network split:
#       zulip-front  (external bridge) — reverse-proxy reach + internet
#                                        egress for SMTP / APNs push
#       zulip-db     (--internal)       — postgres/memcached/rabbitmq/
#                                        redis + zulip backend chatter,
#                                        no internet egress
#   - 127.0.0.1 port binding on 80 — reverse proxy in front for TLS.
#     http_only=True keeps Zulip serving plain HTTP to its proxy.
#   - Healthchecks gate startup via depends_on; pg_isready / nc / ping /
#     redis-cli / curl /health — no credentials on command lines.
#
# Setup:
#   cp .env.example .env  &&  fill secrets (openssl recipes in the file)
#   docker network create zulip-front
#   docker network create --internal zulip-db
#   mkdir -p data/{postgres,rabbitmq,redis,zulip}
#   sudo chown -R "${PUID:-1000}:${PGID:-1000}" data/postgres
#   sudo chown -R 999:999  data/rabbitmq   # rabbitmq uid in rabbitmq:4.2
#   sudo chown -R 999:1000 data/redis      # redis uid:gid in redis:7.4-alpine
#   docker compose up -d
#   # First boot takes 4-6 min while Zulip applies ~280 Django migrations.

name: zulip

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # DATABASE — vanilla postgres:18.4, no pgroonga (Zulip uses built-in tsvector)
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:18.4
    container_name: zulip-postgres
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      POSTGRES_DB: zulip
      POSTGRES_USER: zulip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?postgres password required}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
      # Postgres 18 changed its default data dir; pin it back so users
      # upgrading from postgres:17 don't need a migration.
      PGDATA: /var/lib/postgresql/data
      TZ: ${TZ:-Europe/Bratislava}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - zulip-db
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=64m
      - /var/run/postgresql:size=64m
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
          pids: 300
        reservations:
          memory: 256m
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zulip -d zulip"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # SESSION CACHE — SASL-authenticated memcached
  # ═══════════════════════════════════════════════════════════════════════════

  memcached:
    image: memcached:1.6.42-alpine3.23
    container_name: zulip-memcached
    restart: unless-stopped
    user: "11211:11211"
    command:
      - sh
      - -euc
      - |
        echo 'mech_list: plain' > "$$SASL_CONF_PATH"
        echo "zulip@$$HOSTNAME:$$MEMCACHED_PASSWORD" > "$$MEMCACHED_SASL_PWDB"
        echo "zulip@localhost:$$MEMCACHED_PASSWORD" >> "$$MEMCACHED_SASL_PWDB"
        exec memcached -S
    environment:
      # /tmp is writable for the non-root memcache user; /home/memcache is not.
      SASL_CONF_PATH: /tmp/memcached.conf
      MEMCACHED_SASL_PWDB: /tmp/memcached-sasl-db
      MEMCACHED_PASSWORD: ${MEMCACHED_PASSWORD:?memcached password required}
    networks:
      - zulip-db
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=64m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
          pids: 100
        reservations:
          memory: 64m
          cpus: "0.1"
    healthcheck:
      # SASL-only memcached rejects unauth'd stats commands; a TCP connect
      # confirms the listener is up. Zulip itself does the deeper auth check.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 11211"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ═══════════════════════════════════════════════════════════════════════════
  # EVENT QUEUE — RabbitMQ for tornado/django message passing
  # ═══════════════════════════════════════════════════════════════════════════

  rabbitmq:
    image: rabbitmq:4.2.6
    container_name: zulip-rabbitmq
    restart: unless-stopped
    user: "999:999"
    environment:
      RABBITMQ_DEFAULT_USER: zulip
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?rabbitmq password required}
      # rabbitmq writes its Erlang cookie / data under $HOME — ensure that
      # points at the persistent volume instead of root's home (which the
      # non-root user can't write to).
      HOME: /var/lib/rabbitmq
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    networks:
      - zulip-db
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=128m
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 300
        reservations:
          memory: 128m
          cpus: "0.1"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # RATE-LIMIT STORE — Redis with requirepass auth
  # ═══════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7.4.9-alpine3.21
    container_name: zulip-redis
    restart: unless-stopped
    user: "999:1000"
    command:
      - sh
      - -euc
      - |
        echo "requirepass $$REDIS_PASSWORD" > /tmp/redis.conf
        exec redis-server /tmp/redis.conf
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?redis password required}
    volumes:
      - ./data/redis:/data
    networks:
      - zulip-db
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=64m
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
          pids: 100
        reservations:
          memory: 64m
          cpus: "0.1"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ═══════════════════════════════════════════════════════════════════════════
  # ZULIP SERVER — Django + Tornado + nginx + supervisor in one image
  # ═══════════════════════════════════════════════════════════════════════════

  zulip:
    image: ghcr.io/zulip/zulip-server:12.0-0
    container_name: zulip-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      memcached:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # localhost-only — front with a reverse proxy for public TLS.
      # Port 80 is what nginx inside the container binds to.
      - "127.0.0.1:${COMPOSE_PORT_HTTP:-8080}:80"
    environment:
      # --- Service discovery (matches the service names above) -------------
      SETTING_REMOTE_POSTGRES_HOST: postgres
      SETTING_REMOTE_POSTGRES_PORT: "5432"
      SETTING_MEMCACHED_LOCATION: memcached:11211
      SETTING_RABBITMQ_HOST: rabbitmq
      SETTING_REDIS_HOST: redis
      # --- Secrets (CRITICAL — see .env.example for openssl recipes) -------
      SECRETS_postgres_password: ${POSTGRES_PASSWORD}
      SECRETS_memcached_password: ${MEMCACHED_PASSWORD}
      SECRETS_rabbitmq_password: ${RABBITMQ_DEFAULT_PASS}
      SECRETS_redis_password: ${REDIS_PASSWORD}
      SECRETS_secret_key: ${SECRETS_secret_key:?Django secret key required}
      SECRETS_email_password: ${SECRETS_email_password:-}
      # --- Public-facing identity ------------------------------------------
      SETTING_EXTERNAL_HOST: ${SETTING_EXTERNAL_HOST:?external hostname required}
      SETTING_ZULIP_ADMINISTRATOR: ${SETTING_ZULIP_ADMINISTRATOR:?admin email required}
      ZULIP_AUTH_BACKENDS: ${ZULIP_AUTH_BACKENDS:-EmailAuthBackend}
      # We use vanilla postgres (no pgroonga); Zulip falls back to the
      # built-in postgres tsvector full-text search. Flip to "True" if
      # you swap the postgres service to zulip/zulip-postgresql:14.
      SETTING_USING_PGROONGA: ${SETTING_USING_PGROONGA:-False}
      # http_only=True: Zulip serves plain HTTP, reverse-proxy terminates TLS.
      # Flip to False and unset COMPOSE_PORT_HTTPS to have Zulip self-terminate.
      http_only: ${ZULIP_HTTP_ONLY:-True}
      # --- Optional outbound email (leave SETTING_EMAIL_HOST blank to skip) -
      SETTING_EMAIL_HOST: ${SETTING_EMAIL_HOST:-}
      SETTING_EMAIL_HOST_USER: ${SETTING_EMAIL_HOST_USER:-}
      SETTING_EMAIL_PORT: ${SETTING_EMAIL_PORT:-587}
      SETTING_EMAIL_USE_TLS: ${SETTING_EMAIL_USE_TLS:-True}
      SETTING_EMAIL_USE_SSL: ${SETTING_EMAIL_USE_SSL:-False}
      NOREPLY_EMAIL_ADDRESS: ${NOREPLY_EMAIL_ADDRESS:-}
      # --- Reverse-proxy trust list ----------------------------------------
      # Comma-separated IPs/CIDRs allowed to set X-Forwarded-* headers.
      # Default is the docker-compose bridge — adjust if your proxy lives
      # outside docker. Multiple entries: "10.0.0.0/8,192.168.1.5".
      LOADBALANCER_IPS: ${LOADBALANCER_IPS:-}
      # --- Optional features (uncomment in your .env to enable) ------------
      # SETTING_ZULIP_SERVICE_PUSH_NOTIFICATIONS: "True"
      # SETTING_ZULIP_SERVICE_SUBMIT_USAGE_STATISTICS: "False"
    volumes:
      - ./data/zulip:/data
    ulimits:
      # Upstream-required for tornado's many simultaneous connections.
      nofile:
        soft: 1000000
        hard: 1048576
    networks:
      - zulip-front
      - zulip-db
    cap_drop:
      - ALL
    cap_add:
      # nginx inside the image listens on port 80 in the container.
      - NET_BIND_SERVICE
      # supervisor / entrypoint chown $DATA_DIR/uploads to zulip:zulip on
      # boot and `su zulip -c` is used to drop into the unprivileged user
      # for migrations and long-running workers.
      - CHOWN
      - SETGID
      - SETUID
      # Entrypoint copies system files (cp -p) and rm's old upload symlinks
      # whose owners differ from the running uid.
      - DAC_OVERRIDE
      - FOWNER
    security_opt:
      - no-new-privileges:true
    ipc: private
    tmpfs:
      - /tmp:size=512m
    deploy:
      resources:
        limits:
          memory: 6g
          cpus: "4.0"
          pids: 1024
        reservations:
          memory: 1g
          cpus: "0.5"
    healthcheck:
      # When http_only=True (typical reverse-proxy deployment) Zulip serves
      # /health on port 80; otherwise it self-terminates TLS on 443 and the
      # http path 301-redirects.
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1/health || curl -fsk https://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      # 5 min first-boot budget for ~280 Django migrations on fresh DBs.
      start_period: 300s

# ═══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════

networks:
  # External-facing: reverse proxy reaches Zulip here; also gives the
  # server internet egress for outbound SMTP, mobile push notifications,
  # GitHub/webhook integrations, etc.
  zulip-front:
    external: true
  # Internal: postgres / memcached / rabbitmq / redis + Zulip's backend
  # chatter. No host port, no internet egress.
  zulip-db:
    external: true
